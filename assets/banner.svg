<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="claude-warmup">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141627"/>
      <stop offset="0.55" stop-color="#3a2148"/>
      <stop offset="1" stop-color="#c25a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffb24d"/>
      <stop offset="1" stop-color="#ff7a45"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="300" rx="24" fill="url(#sky)"/>
  <g transform="translate(210,168)">
    <circle r="120" fill="#ffb24d" opacity="0.08"/>
    <circle r="92" fill="#ffb24d" opacity="0.13"/>
    <circle r="66" fill="url(#accent)"/>
    <g stroke="#ffce85" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-92" x2="0" y2="-118"/>
      <line x1="65" y1="-65" x2="83" y2="-83"/>
      <line x1="92" y1="0" x2="118" y2="0"/>
      <line x1="65" y1="65" x2="83" y2="83"/>
      <line x1="-65" y1="-65" x2="-83" y2="-83"/>
      <line x1="-92" y1="0" x2="-118" y2="0"/>
      <line x1="-65" y1="65" x2="-83" y2="83"/>
    </g>
  </g>
  <rect x="0" y="234" width="1200" height="3" fill="#ffce85" opacity="0.22"/>
  <text x="372" y="150" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="68" font-weight="700" fill="#ffffff">claude-warmup</text>
  <text x="374" y="194" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="26" fill="#ffd9a8">an alarm clock for a lazy Claude</text>
  <text x="374" y="228" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="17" fill="#e8c9ff" opacity="0.85">start your 5-hour window before you sit down to work</text>
</svg>
