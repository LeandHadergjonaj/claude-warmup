name: warmup

# Sends Claude Code a single throwaway prompt on a schedule so the 5-hour usage
# window starts before the workday and resets mid-day instead of after it.
# This is a TIMING tool only — it does not increase usage or loop real prompts.

on:
  schedule:
    # NOTE: cron here is in UTC, not your local time. Build/verify with https://crontab.guru
    # Default: 06:00, 11:00, 16:00 UTC, Monday–Friday.
    - cron: "0 6,11,16 * * 1-5"
    # Alternative — every ~5 hours, every day (uncomment to use, and comment out the line above):
    # - cron: "0 0,5,10,15,20 * * *"
  workflow_dispatch: {}

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Warmup ping
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: claude -p "warmup ping, reply with ok"
